<!DOCTYPE html>
<html>
<head>
<title>Basic Calculator</title>
<style>
body{font-family:Arial;text-align:center;margin-top:40px}
input,button{padding:8px;margin:5px}
#result{font-size:20px;font-weight:bold}
body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#74ebd5,#9face6);
text-align:center;
padding-top:60px;
}

h2{
color:white;
margin-bottom:20px;
}

input{
padding:10px;
width:220px;
border:none;
border-radius:25px;
margin:8px;
outline:none;
}

button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#ffffff;
color:#333;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#333;
color:white;
transform:scale(1.05);
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>
</head>
<body>

<h2>Basic Calculator</h2>

<input type="number" id="num1" placeholder="Enter First Number"><br>
<input type="number" id="num2" placeholder="Enter Second Number"><br>

<button onclick="calculate('+')">Add</button>
<button onclick="calculate('-')">Subtract</button>
<button onclick="calculate('*')">Multiply</button>
<button onclick="calculate('/')">Divide</button>

<h3 id="result"></h3>

<script>
function calculate(op){
let n1=document.getElementById("num1").value;
let n2=document.getElementById("num2").value;
let result=document.getElementById("result");

if(n1===""||n2===""){
result.innerHTML="Please enter both numbers";
result.style.color="red";
return;
}

n1=Number(n1);
n2=Number(n2);
let answer;

if(op==="+") answer=n1+n2;
if(op==="-") answer=n1-n2;
if(op==="*") answer=n1*n2;
if(op==="/") answer=n1/n2;

result.innerHTML="Result = "+answer;
result.style.color="green";
}
</script>

</body>
</html>
