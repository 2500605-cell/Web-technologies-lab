<!DOCTYPE html>
<html>
<head>
    <title>Task 4</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body{
            font-family: Arial;
            background: #ffe6e6;
            padding: 30px;
        }
        .box{
            width: 300px;
            margin: auto;
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        button{
            padding: 10px 20px;
            background: red;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body ng-app="">
    <div class="box">
        <h2>Counter App</h2>
        <button ng-click="count = count + 1">Increase</button>
        <p>Count: {{count || 0}}</p>
    </div>
</body>
</html>
